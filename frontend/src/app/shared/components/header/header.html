<nav class="navbar">
  <a routerLink="/shop" class="brand">01Market</a>

  <div class="nav-actions">
    @if (isAuthenticated()) {
    @if (isSeller) {
    <a matButton="filled" routerLink="/seller">Seller Dashboard</a>
    }

    <button class="avatar" (click)="openProfile()" aria-label="Open profile">
      @if (avatarUrl()) {
      <img [src]="avatarUrl()!" [alt]="currentUser()!.username" />
      } @else {
      <mat-icon>account_circle</mat-icon>
      }
    </button>

    <button mat-icon-button (click)="logout()" aria-label="Logout">
      <mat-icon>logout</mat-icon>
    </button>
    } @else {
    <a mat-button routerLink="/login">Login</a>
    <a mat-button routerLink="/register">Register</a>
    }
  </div>
</nav>
